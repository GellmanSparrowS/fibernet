[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.backends._legacy:_Backend"

[project]
name = "fibernet"
version = "0.2.0"
description = "A comprehensive toolkit for fiber network structure generation, simulation, and analysis"
readme = "README.md"
license = {text = "MIT"}
authors = [{name = "FiberNet Contributors"}]
requires-python = ">=3.9"
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering",
    "Topic :: Scientific/Engineering :: Physics",
]
keywords = ["fiber", "network", "simulation", "mechanics", "materials"]

dependencies = [
    "numpy>=1.22",
    "scipy>=1.9",
    "networkx>=2.8",
    "matplotlib>=3.5",
]

[project.optional-dependencies]
viz = [
    "pyvista>=0.37",
]
io = [
    "h5py>=3.7",
]
accel = [
    "taichi>=1.6",
]
analysis = [
    "scikit-learn>=1.0",
]
dev = [
    "pytest>=7.0",
    "pyvista>=0.37",
    "h5py>=3.7",
    "taichi>=1.6",
    "scikit-learn>=1.0",
]
all = [
    "pyvista>=0.37",
    "h5py>=3.7",
    "taichi>=1.6",
    "scikit-learn>=1.0",
]

[project.urls]
Homepage = "https://github.com/GellmanSparrowS/fibernet"
Repository = "https://github.com/GellmanSparrowS/fibernet"
Issues = "https://github.com/GellmanSparrowS/fibernet/issues"

[tool.setuptools.packages.find]
where = ["."]
include = ["fibernet*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"
